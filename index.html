    <script>
        // ============ PWA ============
        if ('serviceWorker' in navigator) {

        // ============ FULLSCREEN ============

            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);

        function resizeCanvas() {
            const container = document.getElementById('gameContainer');
            const maxWidth = Math.min(container.clientWidth - 10, window.innerWidth - 10);
            const maxHeight = Math.min(window.innerHeight - 140, container.clientHeight - 120);
            const aspectRatio = 1100 / 580;
            canvas.width = 1100;
            canvas.height = 580;
            if (maxWidth / maxHeight > aspectRatio) {
                canvas.style.width = (maxHeight * aspectRatio) + 'px';
                canvas.style.height = maxHeight + 'px';
            } else {
                canvas.style.width = maxWidth + 'px';
                canvas.style.height = (maxWidth / aspectRatio) + 'px';
            }
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
        resizeCanvas();

        // ============ АУДИО ============
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx, musicGain, sfxGain, isMusicPlaying = false, musicOscillators = [], musicInterval;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
                musicGain = audioCtx.createGain(); musicGain.gain.value = 0.1; musicGain.connect(audioCtx.destination);
                sfxGain = audioCtx.createGain(); sfxGain.gain.value = 0.2; sfxGain.connect(audioCtx.destination);
            }
        }
        function playNote(f, d, t = 'sine', g = musicGain) {
            if (!audioCtx || !isMusicPlaying) return;
            const o = audioCtx.createOscillator(), gn = audioCtx.createGain();
            o.type = t; o.frequency.value = f;
            gn.gain.setValueAtTime(0.2, audioCtx.currentTime); gn.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
            o.connect(gn); gn.connect(g); o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + d);
        }
        function playJumpSound() {
            if (!audioCtx || !isMusicPlaying) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(400, audioCtx.currentTime); o.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            g.gain.setValueAtTime(0.12, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            o.connect(g); g.connect(sfxGain); o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + 0.15);
        }
        function playCollectSound() {
            if (!audioCtx || !isMusicPlaying) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(1000, audioCtx.currentTime); o.frequency.setValueAtTime(1200, audioCtx.currentTime + 0.05); o.frequency.setValueAtTime(1500, audioCtx.currentTime + 0.1);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            o.connect(g); g.connect(sfxGain); o.start(audioCtx.currentTime); o.stop(audioCtx.currentTime + 0.15);
        }
        function playPowerupSound() {
            if (!audioCtx || !isMusicPlaying) return;
            [523, 659, 784, 1047].forEach((f, i) => {
                const o = audioCtx.createOscillator(), g = audioCtx.createGain();
                o.type = 'sine'; o.frequency.value = f;
                g.gain.setValueAtTime(0.12, audioCtx.currentTime + i * 0.08); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.08 + 0.2);
                o.connect(g); g.connect(sfxGain); o.start(audioCtx.currentTime + i * 0.08); o.stop(audioCtx.currentTime + i * 0.08 + 0.2);
            });
        }
        const melody = [{freq:262,dur:0.3},{freq:330,dur:0.3},{freq:392,dur:0.3},{freq:330,dur:0.3},{freq:294,dur:0.3},{freq:349,dur:0.3},{freq:440,dur:0.3},{freq:349,dur:0.3},{freq:262,dur:0.3},{freq:392,dur:0.3},{freq:523,dur:0.6},{freq:392,dur:0.3},{freq:330,dur:0.3},{freq:262,dur:0.3},{freq:294,dur:0.3},{freq:440,dur:0.6}];
        function startMusic() { if (!audioCtx) initAudio(); isMusicPlaying = true; document.getElementById('musicToggle').textContent = '🔊 Музыка'; playMelody(); musicInterval = setInterval(playMelody, melody.reduce((s,n)=>s+n.dur,0)*1000+350); }
        function stopMusic() { isMusicPlaying = false; document.getElementById('musicToggle').textContent = '🔇 Музыка'; if(musicInterval){clearInterval(musicInterval);musicInterval=null;} musicOscillators.forEach(o=>{try{o.stop();}catch(e){}}); musicOscillators=[]; }
        function playMelody() { if(!isMusicPlaying)return; let t=0; melody.forEach(n=>{setTimeout(()=>{if(isMusicPlaying)playNote(n.freq,n.dur);},t*1000);t+=n.dur;}); }
        function toggleMusic() { if(isMusicPlaying)stopMusic();else startMusic(); }

            for (let t in powerups) if (powerups[t].active && --powerups[t].timer <= 0) { powerups[t].active = false; if (t === 'speed' && speedBoost === 1.6) speedBoost = 1; if (t === 'shield') hasShield = false; if (t === 'magnet') magnetActive = false; updatePowerupIndicators(); }
            character.vy += gravity; character.y += character.vy;
            if (character.y >= character.gy) { character.y = character.gy; character.vy = 0; character.jumping = false; character.jl = character.mj; updateJumpIndicators(); }
            if (magnetActive) for (let s of stars) { const dx = character.x - s.x, dy = (character.y - 35) - s.y, d = Math.sqrt(dx * dx + dy * dy); if (d < 150 && d > 0) { s.x += (dx / d) * 5; s.y += (dy / d) * 5; } }
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 350 - Math.random() * 300) obstacles.push({ x: canvas.width, type: Math.random() < 0.5 ? 'jar' : 'mushroom', width: 45, passed: false });
            if (Math.random() < 0.03) stars.push({ x: canvas.width, y: 180 + Math.random() * 200 });
            if (Math.random() < 0.004) powerupItems.push({ x: canvas.width, y: 200 + Math.random() * 150, type: ['speed', 'shield', 'magnet'][Math.floor(Math.random() * 3)] });
            for (let i = obstacles.length - 1; i >= 0; i--) { obstacles[i].x -= gameSpeed * speedBoost; if (checkCollision(obstacles[i])) { gameRunning = false; gameOverMsg.style.display = 'block'; } if (!obstacles[i].passed && obstacles[i].x + obstacles[i].width < character.x) { obstacles[i].passed = true; score += 10; gameSpeed += 0.06; } if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1); }
            for (let i = stars.length - 1; i >= 0; i--) { stars[i].x -= gameSpeed * speedBoost; if (Math.sqrt((character.x - stars[i].x) ** 2 + ((character.y - 35) - stars[i].y) ** 2) < (magnetActive ? 150 : 50)) { score += 5; gameStars += 5; totalStars += 5; showCE(stars[i].x, stars[i].y); playCollectSound(); stars.splice(i, 1); saveGameData(); } else if (stars[i].x < -20) stars.splice(i, 1); }
            for (let i = powerupItems.length - 1; i >= 0; i--) { powerupItems[i].x -= gameSpeed * speedBoost; if (Math.abs(character.x - powerupItems[i].x) < 40 && Math.abs((character.y - 35) - powerupItems[i].y) < 40) { activatePowerup(powerupItems[i].type); showCE(powerupItems[i].x, powerupItems[i].y, powerupItems[i].type === 'speed' ? '⚡' : powerupItems[i].type === 'shield' ? '🛡️' : '🧲'); powerupItems.splice(i, 1); } else if (powerupItems[i].x < -20) powerupItems.splice(i, 1); }
            scoreDisplay.textContent = `🌙 ${score}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); drawTreeInterior();
            for (let s of stars) drawStar(s.x, s.y);
            for (let p of powerupItems) drawPowerup(p.x, p.y, p.type);
            for (let o of obstacles) drawObstacle(o.x, o.type);
            drawChar(character.x, character.y);
            if (character.dje > 0) { ctx.save(); const a = character.dje / 18, r = (18 - character.dje) * 4, bc = character.y - 35 * VS; ctx.strokeStyle = `rgba(255, 215, 0, ${a * 0.5})`; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(character.x, bc, r, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); character.dje--; }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        loadGameData(); updateJumpIndicators(); updatePowerupIndicators(); updateCharacterEmoji(); totalStarsDisplay.textContent = totalStars;
        document.addEventListener('click', function initAudioOnce() { initAudio(); if (!isMusicPlaying) startMusic(); document.removeEventListener('click', initAudioOnce); }, { once: true });
        document.addEventListener('touchstart', function initAudioOnceTouch() { initAudio(); if (!isMusicPlaying) startMusic(); document.removeEventListener('touchstart', initAudioOnceTouch); }, { once: true });
        resizeCanvas(); gameLoop();
    </script>
</body>
