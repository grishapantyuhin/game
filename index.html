        function drawVupsen(x, y, cl) { ctx.save(); const s = VS, bb = y, bc = y - 40 * s, hy = y - 70 * s; if (hasShield) { const sg = ctx.createRadialGradient(x, bc, 40 * s, x, bc, 50 * s); sg.addColorStop(0, 'rgba(100, 200, 255, 0)'); sg.addColorStop(0.7, 'rgba(100, 200, 255, 0.3)'); sg.addColorStop(1, 'rgba(100, 200, 255, 0)'); ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(x, bc, 50 * s, 0, Math.PI * 2); ctx.fill(); } const gg = ctx.createRadialGradient(x, bc, 30 * s, x, bc, 85 * s); gg.addColorStop(0, cl.b.replace(')', ', 0.35)').replace('rgb', 'rgba')); gg.addColorStop(1, 'rgba(200, 160, 255, 0)'); ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(x, bc, 85 * s, 0, Math.PI * 2); ctx.fill(); for (let i = 3; i >= 0; i--) { const sy = bb - 5 - i * 12 * s; const g = ctx.createRadialGradient(x, sy, 5 * s, x, sy, 16 * s); g.addColorStop(0, cl.s); g.addColorStop(1, cl.b); ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, sy, (14 + i) * s, 0, Math.PI * 2); ctx.fill(); } ctx.fillStyle = cl.b; ctx.beginPath(); ctx.arc(x, hy + 8 * s, 18 * s, 0, Math.PI * 2); ctx.fill(); ctx.fillRect(x - 12 * s, hy - 10 * s, 5 * s, 12 * s); ctx.fillRect(x + 7 * s, hy - 10 * s, 5 * s, 12 * s); ctx.fillStyle = cl.s; ctx.beginPath(); ctx.arc(x - 9.5 * s, hy - 13 * s, 4 * s, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 9.5 * s, hy - 13 * s, 4 * s, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x - 7 * s, hy + 5 * s, 8 * s, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 7 * s, hy + 5 * s, 8 * s, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#FF0000'; ctx.beginPath(); ctx.arc(x - 6 * s, hy + 6 * s, 3.5 * s, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 8 * s, hy + 6 * s, 3.5 * s, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#333'; ctx.lineWidth = 3 * s; ctx.beginPath(); ctx.arc(x, hy + 18 * s, 7 * s, 0.2, Math.PI - 0.2); ctx.stroke(); ctx.restore(); }

        function drawKapa(x, y, cl) { ctx.save(); const s = VS, bb = y, bc = y - 38 * s, hy = y - 68 * s; if (hasShield) { const sg = ctx.createRadialGradient(x, bc, 40 * s, x, bc, 50 * s); sg.addColorStop(0, 'rgba(100, 200, 255, 0)'); sg.addColorStop(0.7, 'rgba(100, 200, 255, 0.3)'); sg.addColorStop(1, 'rgba(100, 200, 255, 0)'); ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(x, bc, 50 * s, 0, Math.PI * 2); ctx.fill(); } const gg = ctx.createRadialGradient(x, bc, 30 * s, x, bc, 85 * s); gg.addColorStop(0, cl.b.replace(')', ', 0.35)').replace('rgb', 'rgba')); gg.addColorStop(1, 'rgba(200, 160, 255, 0)'); ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(x, bc, 85 * s, 0, Math.PI * 2); ctx.fill(); const bg = ctx.createRadialGradient(x - 5 * s, bc, 7 * s, x, bc, 35 * s); bg.addColorStop(0, cl.s); bg.addColorStop(1, cl.b); ctx.fillStyle = bg; ctx.beginPath(); ctx.ellipse(x, bc, 28 * s, 30 * s, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = cl.b; ctx.beginPath(); ctx.ellipse(x - 12 * s, bb - 3, 11 * s, 8 * s, 0, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.ellipse(x + 12 * s, bb - 3, 11 * s, 8 * s, 0, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = 'white'; ctx.fillRect(x - 16 * s, bc + 8 * s, 32 * s, 24 * s); ctx.fillStyle = cl.s; ctx.beginPath(); ctx.arc(x, hy + 8 * s, 22 * s, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x, hy - 2 * s, 24 * s, Math.PI, 0); ctx.fill(); ctx.fillRect(x - 24 * s, hy - 2 * s, 48 * s, 6 * s); ctx.strokeStyle = '#333'; ctx.lineWidth = 3 * s; ctx.beginPath(); ctx.arc(x - 8 * s, hy + 6 * s, 8 * s, 0, Math.PI * 2); ctx.stroke(); ctx.beginPath(); ctx.arc(x + 8 * s, hy + 6 * s, 8 * s, 0, Math.PI * 2); ctx.stroke(); ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x - 8 * s, hy + 6 * s, 6 * s, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 8 * s, hy + 6 * s, 6 * s, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(x - 7 * s, hy + 7 * s, 3 * s, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 9 * s, hy + 7 * s, 3 * s, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#333'; ctx.lineWidth = 3 * s; ctx.beginPath(); ctx.arc(x, hy + 18 * s, 6 * s, 0.1, Math.PI - 0.1); ctx.stroke(); ctx.restore(); }

        function drawPowerup(x, y, t) { ctx.save(); const gg = ctx.createRadialGradient(x, y, 5, x, y, 20); gg.addColorStop(0, t === 'speed' ? 'rgba(255, 255, 0, 0.8)' : t === 'shield' ? 'rgba(100, 200, 255, 0.8)' : 'rgba(255, 100, 100, 0.8)'); gg.addColorStop(1, 'rgba(0, 0, 0, 0)'); ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(x, y, 20, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = t === 'speed' ? '#FFD700' : t === 'shield' ? '#64C8FF' : '#FF6464'; ctx.beginPath(); ctx.arc(x, y, 12, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = 'white'; ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(t === 'speed' ? '⚡' : t === 'shield' ? '🛡️' : '🧲', x, y); ctx.restore(); }
        function drawObstacle(x, t) { ctx.save(); if (t === 'jar') { ctx.fillStyle = '#D4E6FF'; ctx.fillRect(x + 7, GROUND_Y - 14, 38, 25); ctx.fillStyle = '#FF6347'; ctx.fillRect(x + 12, GROUND_Y - 8, 28, 16); ctx.fillStyle = '#B0C4DE'; ctx.fillRect(x, GROUND_Y - 8, 8, 13); ctx.fillStyle = '#FF6B6B'; ctx.fillRect(x - 1, GROUND_Y - 9, 10, 15); ctx.fillStyle = '#FFF8DC'; ctx.fillRect(x + 17, GROUND_Y - 5, 16, 12); ctx.fillStyle = '#FF69B4'; ctx.font = '9px serif'; ctx.fillText('🍯', x + 21, GROUND_Y + 5); } else { ctx.fillStyle = '#F5DEB3'; ctx.fillRect(x + 12, GROUND_Y - 17, 17, 32); ctx.fillStyle = '#FF6347'; ctx.beginPath(); ctx.ellipse(x + 20.5, GROUND_Y - 17, 23, 14, 0, Math.PI, 0); ctx.fill(); ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x + 12, GROUND_Y - 24, 5, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 29, GROUND_Y - 22, 4, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(x + 14, GROUND_Y - 3, 4, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 28, GROUND_Y - 3, 4, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(x + 13, GROUND_Y - 2, 2, 0, Math.PI * 2); ctx.fill(); ctx.beginPath(); ctx.arc(x + 27, GROUND_Y - 2, 2, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = 'black'; ctx.lineWidth = 1.8; ctx.beginPath(); ctx.arc(x + 20.5, GROUND_Y + 2, 3.5, 0.2, Math.PI - 0.2); ctx.stroke(); } ctx.restore(); }
        function drawStar(x, y) { ctx.save(); const gg = ctx.createRadialGradient(x, y, 3.5, x, y, 25); gg.addColorStop(0, 'rgba(255, 255, 200, 1)'); gg.addColorStop(0.5, 'rgba(255, 200, 0, 0.6)'); gg.addColorStop(1, 'rgba(255, 150, 0, 0)'); ctx.fillStyle = gg; ctx.beginPath(); ctx.arc(x, y, 25, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#FFD700'; ctx.shadowColor = '#FFA500'; ctx.shadowBlur = 13; ctx.beginPath(); for (let i = 0; i < 5; i++) { const a = (i * Math.PI * 2) / 5 - Math.PI / 2; if (i === 0) ctx.moveTo(x + Math.cos(a) * 13, y + Math.sin(a) * 13); else ctx.lineTo(x + Math.cos(a) * 13, y + Math.sin(a) * 13); } ctx.closePath(); ctx.fill(); ctx.restore(); }
        function drawTreeInterior() { ctx.fillStyle = ctx.createLinearGradient(0, 0, 0, canvas.height); const wg = ctx.createLinearGradient(0, 0, 0, canvas.height); wg.addColorStop(0, '#3E1F0D'); wg.addColorStop(0.3, '#5C3317'); wg.addColorStop(0.7, '#4A2810'); wg.addColorStop(1, '#2E1508'); ctx.fillStyle = wg; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.strokeStyle = 'rgba(80, 45, 20, 0.2)'; ctx.lineWidth = 3; for (let i = 0; i < 24; i++) { const y = i * 28 + (frameCount % 28); ctx.beginPath(); ctx.moveTo(0, y); ctx.quadraticCurveTo(canvas.width/2, y + 48, canvas.width, y); ctx.stroke(); } const fg = ctx.createLinearGradient(0, GROUND_Y, 0, canvas.height); fg.addColorStop(0, '#8B6914'); fg.addColorStop(0.3, '#5C3317'); fg.addColorStop(1, '#2E1508'); ctx.fillStyle = fg; ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y); ctx.strokeStyle = '#6B3F1F'; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(canvas.width, GROUND_Y); ctx.stroke(); ctx.fillStyle = '#1a0b2e'; ctx.beginPath(); ctx.arc(960, 90, 52, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#2d1b4e'; ctx.beginPath(); ctx.arc(960, 90, 45, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = '#FFE4A0'; ctx.beginPath(); ctx.arc(953, 82, 10, 0, Math.PI * 2); ctx.fill(); ctx.strokeStyle = '#8B5E3C'; ctx.lineWidth = 6; ctx.beginPath(); ctx.arc(960, 90, 52, 0, Math.PI * 2); ctx.stroke(); }

        function update() {
            if (!gameRunning) return; frameCount++;
            for (let t in powerups) if (powerups[t].active && --powerups[t].timer <= 0) { powerups[t].active = false; if (t === 'speed' && speedBoost === 1.6) speedBoost = 1; if (t === 'shield') hasShield = false; if (t === 'magnet') magnetActive = false; updatePowerupIndicators(); }
            character.vy += gravity; character.y += character.vy;
            if (character.y >= character.gy) { character.y = character.gy; character.vy = 0; character.jumping = false; character.jl = character.mj; updateJumpIndicators(); }
            if (magnetActive) for (let s of stars) { const dx = character.x - s.x, dy = (character.y - 35) - s.y, d = Math.sqrt(dx * dx + dy * dy); if (d < 150 && d > 0) { s.x += (dx / d) * 5; s.y += (dy / d) * 5; } }
            if (obstacles.length === 0 || obstacles[obstacles.length - 1].x < canvas.width - 400 - Math.random() * 300) obstacles.push({ x: canvas.width, type: Math.random() < 0.5 ? 'jar' : 'mushroom', width: 45, passed: false });
            if (Math.random() < 0.03) stars.push({ x: canvas.width, y: 180 + Math.random() * 200 });
            if (Math.random() < 0.005) powerupItems.push({ x: canvas.width, y: 200 + Math.random() * 150, type: ['speed', 'shield', 'magnet'][Math.floor(Math.random() * 3)] });
            for (let i = obstacles.length - 1; i >= 0; i--) { obstacles[i].x -= gameSpeed * speedBoost; if (checkCollision(obstacles[i])) { gameRunning = false; gameOverMsg.style.display = 'block'; } if (!obstacles[i].passed && obstacles[i].x + obstacles[i].width < character.x) { obstacles[i].passed = true; score += 10; gameSpeed += 0.06; } if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1); }
            for (let i = stars.length - 1; i >= 0; i--) { stars[i].x -= gameSpeed * speedBoost; if (Math.sqrt((character.x - stars[i].x) ** 2 + ((character.y - 35) - stars[i].y) ** 2) < (magnetActive ? 150 : 50)) { score += 5; gameStars += 5; totalStars += 5; showCE(stars[i].x, stars[i].y); playCollectSound(); stars.splice(i, 1); saveGameData(); } else if (stars[i].x < -20) stars.splice(i, 1); }
            for (let i = powerupItems.length - 1; i >= 0; i--) { powerupItems[i].x -= gameSpeed * speedBoost; if (Math.abs(character.x - powerupItems[i].x) < 40 && Math.abs((character.y - 35) - powerupItems[i].y) < 40) { activatePowerup(powerupItems[i].type); showCE(powerupItems[i].x, powerupItems[i].y, powerupItems[i].type === 'speed' ? '⚡ Ускорение!' : powerupItems[i].type === 'shield' ? '🛡️ Щит!' : '🧲 Магнит!'); powerupItems.splice(i, 1); } else if (powerupItems[i].x < -20) powerupItems.splice(i, 1); }
            scoreDisplay.textContent = `🌙 ${score}`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); drawTreeInterior();
            for (let s of stars) drawStar(s.x, s.y);
            for (let p of powerupItems) drawPowerup(p.x, p.y, p.type);
            for (let o of obstacles) drawObstacle(o.x, o.type);
            drawChar(character.x, character.y);
            if (character.dje > 0) { ctx.save(); const a = character.dje / 22, r = (22 - character.dje) * 4, bc = character.y - 35 * VS; ctx.strokeStyle = ctx.createRadialGradient(character.x, bc, r * 0.5, character.x, bc, r); ctx.strokeStyle = `rgba(255, 215, 0, ${a * 0.6})`; ctx.lineWidth = 4; ctx.beginPath(); ctx.arc(character.x, bc, r, 0, Math.PI * 2); ctx.stroke(); ctx.restore(); character.dje--; }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        loadGameData(); updateJumpIndicators(); updatePowerupIndicators(); updateCharacterEmoji(); totalStarsDisplay.textContent = totalStars;
        document.addEventListener('click', function initAudioOnce() { initAudio(); if (!isMusicPlaying) startMusic(); document.removeEventListener('click', initAudioOnce); }, { once: true });
        gameLoop();
    </script>
</body>
